name: EAS Build Android

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        required: true
        default: android
        type: choice
        options: [android, ios]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install -g eas-cli
      - run: npm install --legacy-peer-deps
        working-directory: bedside-native
      - name: Get account and create project
        working-directory: bedside-native
        run: |
          ACCOUNT=$(eas whoami 2>/dev/null | tr -d '\n')
          echo "Account: $ACCOUNT"
          RESP=$(curl -sf -X POST https://api.expo.dev/graphql \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { app { createApp(appInput: { accountName: \\"$ACCOUNT\\", projectName: \\"nculater\\" }) { id } } }\"}" || echo "{}")
          echo "Resp: $RESP"
          PID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('app',{}).get('createApp',{}).get('id',''))" 2>/dev/null || echo "")
          echo "ProjectID: $PID"
          if [ -n "$PID" ]; then
            python3 -c "
import json,os
with open('app.json') as f: d=json.load(f)
d['expo'].setdefault('extra',{}).update({'eas':{'projectId':'$PID'}})
with open('app.json','w') as f: json.dump(d,f,indent=2)
print('app.json updated')
"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true
      - name: EAS Build Android
        working-directory: bedside-native
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Download APK
        working-directory: bedside-native
        run: |
          URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['artifacts']['buildUrl'])" 2>/dev/null || echo "")
          [ -n "$URL" ] && curl -L "$URL" -o ../nculater.apk && echo "Downloaded"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: nculater-apk
          path: nculater.apk
          if-no-files-found: warn
          retention-days: 90
