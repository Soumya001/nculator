name: EAS Build — Android APK + iOS

on:
  push:
    branches: [main]
    paths:
      - 'bedside-native/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options: [android, ios, all]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: bedside-native/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: bedside-native
        run: npm install

      - name: Init EAS project (first run only)
        working-directory: bedside-native
        run: eas init --id $(eas project:info --json 2>/dev/null | jq -r '.id' || echo "") --non-interactive || eas init --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Build Android APK
        working-directory: bedside-native
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK download URL
        working-directory: bedside-native
        run: |
          URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "APK URL: $URL"
          echo "APK_URL=$URL" >> $GITHUB_ENV
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download and upload APK artifact
        run: |
          curl -L "$APK_URL" -o nculater-android.apk
          echo "Downloaded APK"
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nculater-android-apk
          path: nculater-android.apk
          retention-days: 90
          if-no-files-found: warn

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: bedside-native/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: bedside-native
        run: npm install

      - name: Init EAS project
        working-directory: bedside-native
        run: eas init --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Build iOS
        working-directory: bedside-native
        run: eas build --platform ios --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nculater-ios
          path: '*.ipa'
          retention-days: 90
          if-no-files-found: warn

