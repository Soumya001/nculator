name: EAS Build — Android APK + iOS

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options: [android, ios, all]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Install app dependencies
        working-directory: bedside-native
        run: npm install --legacy-peer-deps

      - name: Verify EAS CLI + token
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK on EAS servers
        working-directory: bedside-native
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK URL and download
        working-directory: bedside-native
        run: |
          URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['artifacts']['buildUrl'])" 2>/dev/null || echo "")
          echo "APK_URL=$URL" >> $GITHUB_ENV
          if [ -n "$URL" ]; then curl -L "$URL" -o ../nculater.apk && echo "✓ Downloaded APK"; fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nculater-android-apk
          path: nculater.apk
          retention-days: 90
          if-no-files-found: warn

  build-ios:
    name: Build iOS IPA
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Install app dependencies
        working-directory: bedside-native
        run: npm install --legacy-peer-deps

      - name: Build iOS on EAS servers
        working-directory: bedside-native
        run: eas build --platform ios --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nculater-ios-ipa
          path: '*.ipa'
          retention-days: 90
          if-no-files-found: warn
