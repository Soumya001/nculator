name: Build Nculator

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install deps
        run: cd nculator && npm install --legacy-peer-deps

      - name: Stamp build number
        run: |
          echo "export const BUILD_NUMBER = ${{ github.run_number }};" > nculator/src/buildNumber.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nculator/src/buildNumber.js
          git commit -m "chore: set build number ${{ github.run_number }} [skip ci]"
          git push origin HEAD:main

      - name: Generate native project
        run: cd nculator && npx expo prebuild --platform android --clean

      - name: Build APK
        run: |
          cd nculator/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find nculator/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: "Nculator Android APK v${{ github.run_number }}"
          body: |
            **Android APK** built directly with Gradle (no EAS).

            Download the file below and install it on your device.

            > Enable "Install from unknown sources" then open the `.apk`

            Built from commit ${{ github.sha }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
